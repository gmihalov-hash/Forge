<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0A0A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ForgeX"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>ForgeX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
body{background:#0A0A0A;transition:background .25s}
#root{display:flex;flex-direction:column;height:100%}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{display:none}

/* ===== THEME VARS (set dynamically via JS) ===== */
:root{
  --bg:#0A0A0A;--surf:#161616;--surf2:#1F1F1F;--surf3:#2A2A2A;
  --txt:#F5F5F5;--txtDim:#A0A0A0;--txtFaint:#666;
  --pri:#FF6B2B;--priDim:#FF6B2B22;--acc:#FFB800;
  --border:#FFFFFF14;--border2:#FFFFFF22;
  --green:#22C55E;--greenDim:#22C55E22;--amber:#F59E0B;--red:#EF4444;
  --r:16px;--rs:10px;
  --safeT:env(safe-area-inset-top,0px);--safeB:env(safe-area-inset-bottom,0px);
}

/* ===== LAYOUT ===== */
.screen{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.scroll{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.safe-top{padding-top:var(--safeT)}
.safe-bot{padding-bottom:var(--safeB)}

/* ===== TYPOGRAPHY ===== */
h1{color:var(--txt);font-size:26px;font-weight:800;letter-spacing:-0.5px}
h2{color:var(--txt);font-size:22px;font-weight:800;letter-spacing:-0.5px}
.subtitle{color:var(--txtDim);font-size:14px;margin-top:8px;line-height:1.4}
.section-title{color:var(--txtDim);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin:22px 0 10px}

/* ===== BUTTONS ===== */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-size:15px;font-weight:700;padding:15px 20px;width:100%;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--pri);color:#fff}
.btn-ghost{background:var(--surf3);color:var(--txt)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--txt)}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:10px;width:auto}
.btn:disabled{opacity:.35;pointer-events:none}

/* ===== CARDS ===== */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card-accent{background:var(--priDim);border:1px solid var(--pri)}

/* ===== PROGRESS DOTS (onboarding) ===== */
.dots{display:flex;gap:6px;justify-content:center;padding:16px 0 4px}
.dot{height:8px;border-radius:4px;background:var(--surf3);transition:all .2s}
.dot.active{width:22px;background:var(--pri)}
.dot:not(.active){width:8px}

/* ===== SELECT CARD ===== */
.select-card{display:flex;align-items:center;border:1.5px solid var(--border);background:var(--surf);border-radius:14px;padding:14px;margin-bottom:10px;transition:all .15s}
.select-card.selected{border-color:var(--pri);background:var(--priDim)}
.select-card .emoji{font-size:22px;margin-right:12px}
.select-card .label{flex:1}
.select-card .label-main{color:var(--txt);font-size:15px;font-weight:600}
.select-card .label-sub{color:var(--txtDim);font-size:12px;margin-top:2px}
.check-dot{width:22px;height:22px;border-radius:11px;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}

/* ===== INPUTS ===== */
.input-wrap{display:flex;align-items:center;background:var(--surf2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.input-wrap input,.input-wrap select{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:16px;font-weight:600}
.input-wrap .unit{color:var(--txtDim);font-size:13px;font-weight:500}
.input-label{color:var(--txtDim);font-size:12px;font-weight:600;margin-bottom:6px;margin-left:2px;display:block}
textarea.note-input{width:100%;background:var(--surf2);border:1px solid var(--border2);border-radius:10px;color:var(--txt);font-size:13px;padding:10px 12px;outline:none;resize:none}

/* ===== TOP NAV (main app) ===== */
#topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:14px 20px 12px;flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{color:var(--txt);font-size:18px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.app-sub{color:var(--txtFaint);font-size:11px;margin-top:2px}
.icon-btn{background:var(--surf3);border:none;color:var(--txt);width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px}

/* ===== BOTTOM TAB BAR ===== */
#bottom-nav{background:var(--surf);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safeB)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--txtFaint);font-size:10px;padding:9px 0 8px;font-weight:600;transition:color .15s}
.bnav-btn.active{color:var(--pri)}
.bnav-icon{font-size:20px;line-height:1}

/* ===== PROGRESS BARS ===== */
.pbar-row{margin-bottom:14px}
.pbar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:var(--txtDim)}
.pbar-track{height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}

/* ===== MACRO GRID ===== */
.macro-grid{display:flex;gap:10px;margin-top:12px}
.macro-card{flex:1;border:1px solid var(--border);border-radius:14px;padding:12px;background:var(--surf)}
.macro-dot{width:8px;height:8px;border-radius:4px;margin-bottom:6px}

/* ===== STAT ROW ===== */
.stat-row{display:flex;justify-content:space-between;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.stat-label{color:var(--txtDim);font-size:13px}
.stat-value{color:var(--txt);font-size:13px;font-weight:700}

/* ===== THEME GRID ===== */
.theme-grid{display:flex;flex-wrap:wrap;gap:14px}
.theme-swatch-wrap{display:flex;flex-direction:column;align-items:center;width:62px}
.theme-swatch{width:54px;height:54px;border-radius:16px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;position:relative}
.theme-swatch-dot{width:10px;height:10px;border-radius:5px;position:absolute;top:6px;right:6px}
.theme-swatch-name{font-size:10.5px;margin-top:6px;font-weight:600;color:var(--txtFaint)}

/* ===== SETTINGS ROW ===== */
.setting-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-icon{font-size:16px;margin-right:12px}
.setting-label{color:var(--txt);font-size:14px;flex:1}
.setting-value{color:var(--txtDim);font-size:13px;margin-right:6px}
.setting-arrow{color:var(--txtFaint);font-size:14px}

/* ===== AVATAR ===== */
.avatar{width:56px;height:56px;border-radius:28px;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px}
.tier-badge{display:inline-flex;background:var(--surf3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--txtDim);margin-top:4px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:300;display:flex;align-items:flex-end}
.modal-sheet{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safeB));width:100%;max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--surf3);border-radius:2px;margin:0 auto 16px}

/* ===== EXERCISE / WORKOUT (reused from training module) ===== */
.day-header{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-size:22px;font-weight:800;letter-spacing:-.8px}
.day-sub{font-size:12px;color:var(--txtDim);margin-top:2px}
.sets-big{font-size:24px;font-weight:800}
.sets-label{font-size:10px;color:var(--txtFaint)}
.ex-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 14px 10px}
.ex-num{width:26px;height:26px;border-radius:8px;background:var(--surf3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txtDim);flex-shrink:0}
.ex-name{font-size:14px;font-weight:600;flex:1;line-height:1.3;color:var(--txt)}
.ex-badge{background:var(--surf3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--txtDim);white-space:nowrap}
.ex-done .ex-num{background:var(--greenDim);color:var(--green)}
.ex-done .ex-name{color:var(--txtFaint);text-decoration:line-through}
.ex-note{font-size:11px;color:var(--txtFaint);padding:0 14px 10px 52px;line-height:1.5}
.ex-body{padding:0 14px 14px}
.set-header{display:grid;grid-template-columns:24px 1fr 1fr 1fr 30px;gap:6px;font-size:9.5px;color:var(--txtFaint);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 1fr 30px;gap:6px;align-items:center;margin-top:6px}
.set-num{font-size:12px;font-weight:700;color:var(--txtFaint);text-align:center}
.set-input{background:var(--surf2);border:1px solid var(--border2);border-radius:8px;color:var(--txt);font-size:14px;font-weight:600;text-align:center;padding:8px 2px;width:100%;outline:none}
.rir-select{background:var(--surf2);border:1px solid var(--border2);border-radius:8px;color:var(--txtDim);font-size:12px;text-align:center;padding:8px 1px;width:100%;outline:none;appearance:none}
.set-check{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--txt)}
.set-check.done{background:var(--green);border-color:var(--green);color:#fff}

.empty-state{text-align:center;padding:48px 20px;color:var(--txtFaint)}
.empty-emoji{font-size:36px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;color:var(--txtDim)}
.empty-sub{font-size:13px;margin-top:6px}

.pr-badge{display:inline-flex;align-items:center;gap:3px;background:#F59E0B22;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--amber)}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
