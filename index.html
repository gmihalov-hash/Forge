<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0C0C0E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ForgeX"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<title>ForgeX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9909275615095854" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif}
body{background:#0C0C0E;transition:background .3s}
#root{display:flex;flex-direction:column;height:100%}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{display:none}

/* ═══ DESIGN TOKENS ═══ */
:root{
  /* Pozadie – teplejšia tma než čistá čierna */
  --bg:#0C0C0E;
  --surf:#18181C;
  --surf2:#222228;
  --surf3:#2E2E36;
  --surf4:#38383E;

  /* Text */
  --txt:#F2F2F4;
  --txtDim:#8E8E9E;
  --txtFaint:#4A4A58;

  /* Primárna – žeravý kov */
  --pri:#FF4D1A;
  --priDim:#FF4D1A18;
  --priMid:#FF4D1A44;
  --priLight:#FF7A50;

  /* Akcenty */
  --acc:#FF9F1C;
  --accDim:#FF9F1C18;
  --green:#2DD36F;
  --greenDim:#2DD36F18;
  --amber:#FFBE0B;
  --red:#FF3B30;
  --blue:#3B82F6;

  /* Borders – jemné, takmer neviditeľné */
  --border:#FFFFFF0C;
  --border2:#FFFFFF18;
  --border3:#FFFFFF28;

  /* Geometria */
  --r:14px;
  --rs:10px;
  --rL:20px;

  /* Spacing */
  --pad:20px;

  /* Safe area */
  --safeT:env(safe-area-inset-top,0px);
  --safeB:env(safe-area-inset-bottom,0px);
  --safeL:env(safe-area-inset-left,0px);
  --safeR:env(safe-area-inset-right,0px);
}

@media (max-width:374px){ :root{ --pad:14px; } h1{font-size:22px} h2{font-size:19px} }
@media (min-width:430px){ :root{ --pad:22px; } }

/* ═══ LANDSCAPE MÓD ═══ */
/* Aktivuje sa keď je telefón otočený nabok (šírka > výška, a dostatočne široký) */
@media (orientation:landscape) and (min-width:560px){
  :root{ --pad:28px; }
  /* Obsah sa necentruje na celú šírku, ale zostáva čitateľný (max-width) s bočnými okrajmi */
  .scroll{ max-width:900px; margin:0 auto; width:100%; }
  /* Hlavný obsah na Home/Štatistikách/Výžive sa rozloží do 2 stĺpcov */
  .landscape-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
  .landscape-grid > *{ margin-bottom:0 !important; }
  /* Bottom nav v landscape - užší, nezaberá toľko vertikálneho priestoru */
  #bottom-nav{ padding-top:4px; }
  .bnav-icon{ font-size:18px; }
  /* Topbar mierne nižší */
  #topbar{ padding-top:calc(var(--safeT) + 8px); padding-bottom:8px; }
}
/* Pri veľmi nízkej výške (landscape na malom telefóne) skrátime safe-top odstupy */
@media (orientation:landscape) and (max-height:430px){
  .safe-top{ padding-top:calc(var(--safeT) + 8px); }
  .safe-bot{ padding-bottom:calc(var(--safeB) + 8px); }
}

/* ═══ LAYOUT ═══ */
#root{padding-left:var(--safeL);padding-right:var(--safeR)}
.screen{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-height:0}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px var(--pad);-webkit-overflow-scrolling:touch}
.safe-top{padding-top:calc(var(--safeT) + 16px)}
.safe-bot{padding-bottom:calc(var(--safeB) + 16px)}

/* ═══ TYPOGRAPHY ═══ */
h1{color:var(--txt);font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.1}
h2{color:var(--txt);font-size:22px;font-weight:700;letter-spacing:-.5px}
.subtitle{color:var(--txtDim);font-size:14px;margin-top:6px;line-height:1.5}
.section-title{
  color:var(--txtFaint);font-size:10px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  margin:24px 0 10px;
}
/* Veľké čísla – hviezda UI */
.num-hero{font-size:42px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1}
.num-lg{font-size:28px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.num-md{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}

/* ═══ BUTTONS ═══ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;letter-spacing:-.2px;
  padding:16px 20px;width:100%;
  transition:transform .12s,opacity .12s;
  touch-action:manipulation;
}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--pri);color:#fff}
.btn-ghost{background:var(--surf3);color:var(--txt)}
.btn-outline{background:transparent;border:1px solid var(--border3);color:var(--txt)}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:var(--rs);width:auto}
.btn-xs{padding:6px 10px;font-size:11px;border-radius:8px;width:auto}
.btn:disabled{opacity:.3;pointer-events:none}

/* ═══ CARDS ═══ */
.card{
  background:var(--surf);
  border:0.5px solid var(--border);
  border-radius:var(--r);
  padding:16px;
}
.card-accent{background:var(--priDim);border:0.5px solid var(--priMid)}
.card-green{background:var(--greenDim);border:0.5px solid var(--green)}
.card-amber{background:var(--accDim);border:0.5px solid var(--acc)}

/* ═══ HERO CARD (dnešný tréning) ═══ */
.hero-card{
  background:linear-gradient(135deg, var(--surf) 0%, #1E1820 100%);
  border:0.5px solid var(--priMid);
  border-radius:var(--rL);
  padding:20px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s;
}
.hero-card:active{transform:scale(.99)}
.hero-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle, var(--priMid) 0%, transparent 70%);
  pointer-events:none;
}
.hero-title{color:var(--pri);font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:6px}
.hero-name{color:var(--txt);font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.hero-sub{color:var(--txtDim);font-size:13px}
.hero-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--pri);color:#fff;
  font-size:12px;font-weight:700;
  padding:5px 12px;border-radius:99px;
  margin-top:14px;
}

/* ═══ KALORICKÝ KRUH ═══ */
.cal-ring-wrap{display:flex;align-items:center;gap:16px}
.cal-ring-svg{flex-shrink:0}
.cal-ring-info{flex:1}
.cal-ring-kcal{color:var(--txt);font-size:22px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.cal-ring-label{color:var(--txtDim);font-size:11px;margin-top:2px}
.cal-ring-remain{color:var(--pri);font-size:13px;font-weight:600;margin-top:6px}

/* ═══ MACRO BARS ═══ */
.macro-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.macro-row:last-child{margin-bottom:0}
.macro-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.macro-label{color:var(--txtDim);font-size:12px;width:72px;flex-shrink:0}
.macro-track{flex:1;height:4px;background:var(--surf3);border-radius:99px;overflow:hidden}
.macro-fill{height:100%;border-radius:99px;transition:width .4s ease}
.macro-val{color:var(--txtFaint);font-size:11px;font-variant-numeric:tabular-nums;width:60px;text-align:right;flex-shrink:0}

/* ═══ TOP NAV ═══ */
#topbar{
  background:var(--bg);
  border-bottom:0.5px solid var(--border);
  padding:calc(var(--safeT) + 12px) var(--pad) 12px;
  flex-shrink:0;
}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-logo{display:flex;align-items:baseline;gap:2px}
.app-logo-x{color:var(--pri);font-size:20px;font-weight:800;letter-spacing:-1px}
.app-logo-forge{color:var(--txt);font-size:20px;font-weight:800;letter-spacing:-1px}
.app-date{color:var(--txtFaint);font-size:11px;margin-top:1px;letter-spacing:.2px}
.icon-btn{
  background:var(--surf2);border:none;color:var(--txtDim);
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ═══ BOTTOM TAB NAV ═══ */
#bottom-nav{
  background:var(--bg);
  border-top:0.5px solid var(--border);
  display:flex;flex-shrink:0;
  padding-bottom:var(--safeB);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:var(--txtFaint);
  font-size:10px;font-weight:600;letter-spacing:.2px;
  padding:10px 0 8px;
  transition:color .15s;
  touch-action:manipulation;
}
.bnav-btn.active{color:var(--pri)}
.bnav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bnav-icon svg{width:22px;height:22px}

/* ═══ ONBOARDING ═══ */
.dots{display:flex;gap:5px;justify-content:center;padding:12px 0}
.dot{height:3px;border-radius:99px;background:var(--surf4);transition:all .25s}
.dot.active{width:24px;background:var(--pri)}
.dot:not(.active){width:6px}

/* ═══ SELECT CARD ═══ */
.select-card{
  display:flex;align-items:center;
  border:0.5px solid var(--border2);background:var(--surf);
  border-radius:var(--r);padding:14px;margin-bottom:8px;
  transition:all .15s;cursor:pointer;
}
.select-card.selected{border-color:var(--pri);background:var(--priDim)}
.select-card .emoji{font-size:20px;margin-right:12px}
.select-card .label{flex:1}
.select-card .label-main{color:var(--txt);font-size:15px;font-weight:600}
.select-card .label-sub{color:var(--txtDim);font-size:12px;margin-top:2px}
.check-dot{
  width:20px;height:20px;border-radius:50%;
  background:var(--pri);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;
}

/* ═══ INPUTS ═══ */
.input-wrap{
  display:flex;align-items:center;
  background:var(--surf2);border:0.5px solid var(--border2);
  border-radius:var(--rs);padding:13px 14px;margin-bottom:12px;
}
.input-wrap input,.input-wrap select{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--txt);font-size:16px;font-weight:600;
}
.input-wrap .unit{color:var(--txtFaint);font-size:12px;font-weight:500}
.input-label{color:var(--txtDim);font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;margin-left:2px;display:block}
textarea.note-input{
  width:100%;background:var(--surf2);border:0.5px solid var(--border2);
  border-radius:var(--rs);color:var(--txt);font-size:13px;
  padding:10px 12px;outline:none;resize:none;
}

/* ═══ STAT ROW ═══ */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:10px;border-bottom:0.5px solid var(--border)}
.stat-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.stat-label{color:var(--txtDim);font-size:13px}
.stat-value{color:var(--txt);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

/* ═══ PBAR ═══ */
.pbar-row{margin-bottom:12px}
.pbar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--txtDim)}
.pbar-track{height:5px;background:var(--surf3);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .35s ease}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:300;display:flex;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-sheet{background:var(--surf);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safeB));width:100%;max-height:85vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:var(--surf4);border-radius:99px;margin:0 auto 18px}

/* ═══ SETTINGS ═══ */
.setting-row{
  display:flex;align-items:center;
  padding:15px 16px;border-bottom:0.5px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.setting-row:active{background:var(--surf2)}
.setting-row:last-child{border-bottom:none}
.setting-icon{font-size:15px;margin-right:12px;width:20px;text-align:center}
.setting-label{color:var(--txt);font-size:14px;flex:1}
.setting-value{color:var(--txtFaint);font-size:12px;margin-right:6px}
.setting-arrow{color:var(--txtFaint);font-size:12px}
.setting-toggle-row{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--border)}
.setting-toggle-row:last-child{border-bottom:none}

/* ═══ AVATAR ═══ */
.avatar{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--pri),var(--priLight));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:20px;letter-spacing:-1px;
}
.tier-badge{
  display:inline-flex;background:var(--surf3);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:700;
  color:var(--txtFaint);letter-spacing:.4px;text-transform:uppercase;margin-top:4px;
}

/* ═══ EXERCISE CARDS ═══ */
.day-header{
  background:var(--surf);border:0.5px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.day-title{font-size:24px;font-weight:800;letter-spacing:-1px}
.day-sub{font-size:12px;color:var(--txtDim);margin-top:2px;letter-spacing:.1px}
.sets-big{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.sets-label{font-size:9px;color:var(--txtFaint);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.ex-card{background:var(--surf);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 14px 10px;cursor:pointer}
.ex-num{
  width:24px;height:24px;border-radius:7px;background:var(--surf3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--txtFaint);flex-shrink:0;
}
.ex-name{font-size:14px;font-weight:600;flex:1;line-height:1.3;color:var(--txt)}
.ex-badge{
  background:var(--surf3);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:600;color:var(--txtDim);white-space:nowrap;
}
.ex-done .ex-num{background:var(--greenDim);color:var(--green)}
.ex-done .ex-name{color:var(--txtFaint);text-decoration:line-through}
.ex-note{font-size:11px;color:var(--txtFaint);padding:0 14px 10px 50px;line-height:1.5}
.ex-body{padding:0 14px 14px}

/* ═══ STEPPER ═══ */
.set-block{background:var(--surf2);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-top:8px;transition:all .2s}
.set-block.done{background:var(--greenDim);border-color:var(--green)}
.set-block-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-block-label{font-size:12px;font-weight:600;color:var(--txtDim);flex:1;text-transform:uppercase;letter-spacing:.4px}
.set-block.done .set-block-label{color:var(--green)}
.set-fields{display:flex;gap:8px}
.stepper{flex:1;display:flex;flex-direction:column;gap:4px}
.stepper-label{font-size:9px;color:var(--txtFaint);text-transform:uppercase;letter-spacing:.6px;text-align:center}
.stepper-row{display:flex;align-items:center;background:var(--surf);border:0.5px solid var(--border2);border-radius:10px;overflow:hidden}
.stepper-btn{
  width:36px;height:42px;background:var(--surf3);border:none;
  color:var(--txtDim);font-size:20px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
}
.stepper-btn:active{background:var(--pri);color:#fff}
.stepper-val{
  flex:1;text-align:center;border:none;background:transparent;
  color:var(--txt);font-size:17px;font-weight:700;
  outline:none;width:100%;min-width:0;font-variant-numeric:tabular-nums;
}
.set-check-lg{
  width:42px;height:42px;border-radius:10px;
  border:1px solid var(--border3);background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--txtDim);flex-shrink:0;align-self:flex-end;
  touch-action:manipulation;
}
.set-check-lg.done{background:var(--green);border-color:var(--green);color:#fff}
.prog-hint{
  font-size:11px;color:var(--pri);background:var(--priDim);
  border-radius:8px;padding:8px 12px;margin-bottom:10px;line-height:1.4;
  border-left:2px solid var(--pri);
}

/* ═══ RIR ═══ */
.rir-inline{display:flex;align-items:center;gap:8px;margin-top:10px}
.rir-inline label{font-size:11px;color:var(--txtFaint)}
.rir-inline select{flex:1;background:var(--surf);border:0.5px solid var(--border2);border-radius:8px;color:var(--txtDim);font-size:13px;padding:7px 8px;outline:none}

/* ═══ REST TIMER ═══ */
#rest-timer{position:fixed;left:0;right:0;top:calc(var(--safeT) + 10px);z-index:250;display:flex;justify-content:center;padding:0 var(--pad);pointer-events:none}
.rest-timer-inner{
  background:var(--pri);color:#fff;border-radius:14px;
  padding:12px 18px;display:flex;align-items:center;gap:14px;
  box-shadow:0 8px 32px #FF4D1A44;pointer-events:auto;max-width:420px;width:100%;
}
.rest-time{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:56px;letter-spacing:-.5px}
.rest-label{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:.6px}
.rest-btns{display:flex;gap:6px;margin-left:auto}
.rest-mini-btn{background:#ffffff22;border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;touch-action:manipulation}
.rest-mini-btn:active{background:#ffffff44}

/* ═══ TOGGLE ═══ */
.toggle{width:44px;height:26px;border-radius:99px;background:var(--surf4);border:none;position:relative;flex-shrink:0;transition:background .2s;touch-action:manipulation}
.toggle.on{background:var(--pri)}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px #0004}
.toggle.on .toggle-knob{transform:translateX(18px)}

/* ═══ SEGMENT ═══ */
.segment{display:flex;background:var(--surf2);border-radius:10px;padding:3px;gap:2px}
.segment-btn{flex:1;padding:9px 0;border:none;background:transparent;color:var(--txtDim);font-size:13px;font-weight:600;border-radius:8px;touch-action:manipulation;letter-spacing:-.1px}
.segment-btn.active{background:var(--pri);color:#fff}

/* ═══ EMPTY STATE ═══ */
.empty-state{text-align:center;padding:52px 20px}
.empty-emoji{font-size:40px;margin-bottom:12px;display:block}
.empty-title{font-size:16px;font-weight:700;color:var(--txtDim);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--txtFaint);line-height:1.5}

/* ═══ PR BADGE ═══ */
.pr-badge{display:inline-flex;align-items:center;gap:3px;background:var(--accDim);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--amber)}

/* ═══ PROGRESS HINT ═══ */
/* (already defined above) */

/* ═══ THEME GRID ═══ */
.theme-grid{display:flex;flex-wrap:wrap;gap:12px}
.theme-swatch-wrap{display:flex;flex-direction:column;align-items:center;width:58px}
.theme-swatch{width:50px;height:50px;border-radius:14px;border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .2s}
.theme-swatch-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:6px;right:6px}
.theme-swatch-name{font-size:10px;margin-top:5px;font-weight:600;color:var(--txtFaint)}

/* ═══ MACRO GRID (onboarding results) ═══ */
.macro-grid{display:flex;gap:8px;margin-top:12px}
.macro-card{flex:1;border:0.5px solid var(--border);border-radius:12px;padding:12px;background:var(--surf)}
.macro-card-dot{width:6px;height:6px;border-radius:50%;margin-bottom:6px}

/* ═══ TOAST ═══ */
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateX(-50%) translateY(-4px)}}

/* ═══ WORKOUT MODE ═══ */
.wo-dots{display:flex;gap:5px;align-items:center}
.wo-dot{height:4px;border-radius:99px;background:var(--surf4);transition:all .2s}
.wo-dot.active{width:16px;background:var(--pri)}
.wo-dot.done-dot{width:8px;background:var(--green)}
.wo-dot:not(.active):not(.done-dot){width:8px}

/* ═══ MISC ═══ */
.set-input{background:var(--surf2);border:0.5px solid var(--border2);border-radius:8px;color:var(--txt);font-size:14px;font-weight:600;text-align:center;padding:8px 2px;width:100%;outline:none}
.rir-select{background:var(--surf2);border:0.5px solid var(--border2);border-radius:8px;color:var(--txtDim);font-size:12px;text-align:center;padding:8px 1px;width:100%;outline:none;appearance:none}

/* ═══ SPLASH SCREEN ═══ */
#splash{position:fixed;inset:0;background:#0C0C0E;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.splash-logo-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.splash-glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--pri)55,transparent 70%);opacity:0;animation:splashGlow 2.4s ease-out forwards}
.splash-logo{width:104px;height:104px;border-radius:28px;background:linear-gradient(135deg,#FF6B2B,#FF4D1A);display:flex;align-items:center;justify-content:center;position:relative;z-index:2;opacity:0;transform:scale(.6) rotate(-8deg);animation:splashLogoIn .9s cubic-bezier(.34,1.56,.64,1) .2s forwards;box-shadow:0 0 0 rgba(255,77,26,0)}
.splash-logo span{font-size:52px;font-weight:900;color:#fff;letter-spacing:-2px}
.splash-spark{position:absolute;border-radius:50%;background:#FFB800;opacity:0;pointer-events:none}
.splash-title{margin-top:28px;font-size:28px;font-weight:800;letter-spacing:-1px;color:#F5F5F5;opacity:0;transform:translateY(10px);animation:splashTextIn .6s ease-out .95s forwards}
.splash-tagline{margin-top:8px;font-size:13px;color:#8A8A92;letter-spacing:.3px;opacity:0;transform:translateY(8px);animation:splashTextIn .6s ease-out 1.25s forwards}
@keyframes splashGlow{0%{opacity:0;transform:scale(.4)}40%{opacity:1;transform:scale(1)}100%{opacity:.5;transform:scale(1.15)}}
@keyframes splashLogoIn{0%{opacity:0;transform:scale(.6) rotate(-8deg)}55%{opacity:1;transform:scale(1.08) rotate(2deg);box-shadow:0 0 40px rgba(255,77,26,.6)}100%{opacity:1;transform:scale(1) rotate(0);box-shadow:0 0 24px rgba(255,77,26,.4)}}
@keyframes splashTextIn{to{opacity:1;transform:translateY(0)}}
@keyframes sparkFly{0%{opacity:0;transform:translate(0,0) scale(1)}10%{opacity:1}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.2)}}
#splash.fade-out{animation:splashFadeOut .35s ease-in forwards}
@keyframes splashFadeOut{to{opacity:0}}

/* ═══ LOADING PLAN (Pripravujem tvoj plán) ═══ */
.lp-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center}
.lp-anvil-glow{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.lp-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--pri);opacity:.25;animation:lpPulse 1.6s ease-out infinite}
.lp-ring.r2{animation-delay:.5s}
.lp-ring.r3{animation-delay:1s}
@keyframes lpPulse{0%{transform:scale(.5);opacity:.5}100%{transform:scale(1.5);opacity:0}}
.lp-hammer{font-size:48px;animation:lpHammer 0.9s ease-in-out infinite;transform-origin:70% 20%}
@keyframes lpHammer{0%,100%{transform:rotate(-28deg)}45%{transform:rotate(18deg)}55%{transform:rotate(22deg)}}
.lp-title{font-size:21px;font-weight:800;color:var(--txt);letter-spacing:-.4px;margin-bottom:8px}
.lp-step{font-size:13px;color:var(--txtDim);min-height:18px;transition:opacity .3s}
.lp-progress-track{width:200px;height:4px;background:var(--surf3);border-radius:99px;margin-top:24px;overflow:hidden}
.lp-progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--acc));border-radius:99px;width:0%;transition:width .4s ease-out}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-logo-wrap">
    <div class="splash-glow"></div>
    <div class="splash-logo"><span>X</span></div>
  </div>
  <div class="splash-title">ForgeX</div>
  <div class="splash-tagline">Forged by effort, not luck.</div>
</div>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
